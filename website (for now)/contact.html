<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>Logo Nav - Start Bootstrap Template</title>

    <!-- CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/css/bootstrap.min.css">
    <link href="css/logo-nav.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/contact.css">

    <!-- JS -->
     <script src="js/jquery-1.11.2.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/js/bootstrap.min.js"></script>

    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
        <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->

</head>

<body>

    <!-- Navigation -->
    <nav class="navbar navbar-inverse navbar-fixed-top" role="navigation">
        <div class="container">
            <!-- Brand and toggle get grouped for better mobile display -->
            <div class="navbar-header">
                <a class="navbar-brand" href="#">
                    <img src="media/logo.png" alt="" height="90px" width="270px">
                </a>
            </div>
            <!-- Collect the nav links, forms, and other content for toggling -->
            <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
                <ul class="list-inline">
                        <li>
                            <a href="#"><img src="media/social/facebook-b.png" onmouseover="this.src='media/social/facebook.png'" onmouseout="this.src='media/social/facebook-b.png'"/></a>
                        </li>
                        <li>
                            <a href="#"><img src="media/social/twitter-b.png" onmouseover="this.src='media/social/twitter.png'" onmouseout="this.src='media/social/twitter-b.png'"/></a>
                        </li>
                        <li>
                            <a href="#"><img src="media/social/you_tube-b.png" onmouseover="this.src='media/social/you_tube.png'" onmouseout="this.src='media/social/you_tube-b.png'"/></a>
                        </li>
                        <li>
                            <a href="#"><img src="media/social/share-this-b.png" onmouseover="this.src='media/social/share-this.png'" onmouseout="this.src='media/social/share-this-b.png'"/></a>
                        </li>
                    </ul>
            </div>
            <!-- /.navbar-collapse -->
        </div>
        <!-- /.container -->
    </nav>

    <!--this is where all of the content should go-->
    <div class="container">
        <div class="row" id="content">
            <form id="contactInfo">
                <div class="col-lg-12">
                    <h2>Contact Us</h2>
                    <hr>
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="First Name" aria-describedby="basic-addon1">
                        <span class="input-group-addon" id="basic-addon1">&nbsp&nbsp&nbsp</span>
                        <input type="text" class="form-control" placeholder="Last Name" aria-describedby="basic-addon1">
                    </div>
                    <br>
                    <div class="input-group">
                      <input type="text" class="form-control" placeholder="Email" aria-describedby="basic-addon2">
                     <span class="input-group-addon" id="basic-addon1">@</span>
                     <input type="text" class="form-control" placeholder="Domain" aria-describedby="basic-addon2">
                    </div>
                    <br>
                </div>
            </form>
        </div>
    </div>
    

    <!--footer-->
    <footer>
        <div class="container-fluid">
            <div class="row" id="foot">
                <div class="col-lg-10 col-lg-offset-1 text-center">
                    <h4><strong>Rise of the Restless</strong>
                    </h4>
                    <ul class="list-inline">
                        <li>
                            <a href="#"><img src="media/social/facebook-b.png" onmouseover="this.src='media/social/facebook.png'" onmouseout="this.src='media/social/facebook-b.png'"/></a>
                        </li>
                        <li>
                            <a href="#"><img src="media/social/twitter-b.png" onmouseover="this.src='media/social/twitter.png'" onmouseout="this.src='media/social/twitter-b.png'"/></a>
                        </li>
                        <li>
                            <a href="#"><img src="media/social/you_tube-b.png" onmouseover="this.src='media/social/you_tube.png'" onmouseout="this.src='media/social/you_tube-b.png'"/></a>
                        </li>
                        <li>
                            <a href="#"><img src="media/social/share-this-b.png" onmouseover="this.src='media/social/share-this.png'" onmouseout="this.src='media/social/share-this-b.png'"/></a>
                        </li>
                    </ul>
                    <hr class="small">
                    <p class="text-muted">Copyright &copy; 2015</p>
                </div>
            </div>
        </div>
    </footer>

    

</body>

</html>
